name: Build & Deploy to Azure

on:
  push:
    branches:
      - dev-main   # → Staging
      - master     # → Production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: govkloudacr.azurecr.io
          username: ${{ secrets.ACR_CLIENT_ID }}
          password: ${{ secrets.ACR_CLIENT_SECRET }}

      # ─── STAGING: dev-main branch ───
      - name: Build and push Docker image (Staging)
        if: github.ref == 'refs/heads/dev-main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            govkloudacr.azurecr.io/govkloud-app:staging
            govkloudacr.azurecr.io/govkloud-app:dev-${{ github.sha }}

      # ─── PRODUCTION: master branch ───
      - name: Build and push Docker image (Production)
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            govkloudacr.azurecr.io/govkloud-app:production
            govkloudacr.azurecr.io/govkloud-app:${{ github.sha }}

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ─── Deploy to STAGING slot ───
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/dev-main'
        run: |
          az webapp config container set \
            --name govkloud-app \
            --resource-group govkloud-rg \
            --slot staging \
            --container-image-name govkloudacr.azurecr.io/govkloud-app:dev-${{ github.sha }}
          az webapp restart \
            --resource-group govkloud-rg \
            --name govkloud-app \
            --slot staging
          sleep 15

      # ─── Deploy to PRODUCTION slot ───
      - name: Deploy to Production
        if: github.ref == 'refs/heads/master'
        run: |
          az webapp config container set \
            --name govkloud-app \
            --resource-group govkloud-rg \
            --container-image-name govkloudacr.azurecr.io/govkloud-app:${{ github.sha }}
          az webapp restart \
            --resource-group govkloud-rg \
            --name govkloud-app
          sleep 15

      # ─── Verify ───
      - name: Verify Staging deployment
        if: github.ref == 'refs/heads/dev-main'
        run: |
          echo "✅ Image: govkloudacr.azurecr.io/govkloud-app:dev-${{ github.sha }}"
          echo "✅ Deployed to: https://govkloud-app-staging.azurewebsites.net"
          echo "🔗 Commit: ${{ github.sha }}"

      - name: Verify Production deployment
        if: github.ref == 'refs/heads/master'
        run: |
          echo "✅ Image: govkloudacr.azurecr.io/govkloud-app:${{ github.sha }}"
          echo "✅ Deployed to: https://govkloud.com"
          echo "🔗 Commit: ${{ github.sha }}"
